{% extends 'base.html' %}
{% block content %}
<h1 class="my-5">Отчёт по страницам</h1>
<a href="{{ url_for('visit_logs.index') }}" class="btn btn-secondary mb-3">← К журналу</a>

<table class="table table-bordered">
    <thead>
        <tr><th>№</th><th>Страница</th><th>Количество посещений</th></tr>
    </thead>
    <tbody>
        {% for row in stats %}
        <tr>
            <td>{{ loop.index }}</td>
            <td><code>{{ row.path }}</code></td>
            <td>{{ row.count }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<a href="{{ url_for('visit_logs.pages_export') }}" class="btn btn-primary">Экспорт в CSV</a>
{% endblock %}
