{% extends 'base.html' %}
{% from 'user_form.html' import render_form %}
{% block content %}
<h1 class="my-5">Редактировать пользователя</h1>
<div class="col-md-6">
    <form method="post">
        {{ render_form(form_data, errors, roles, show_login_password=False, disable_role=disable_role) }}
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a href="{{ url_for('users_list') }}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
