{% extends 'base.html' %}
{% block content %}
<h1 class="my-5">Смена пароля</h1>
<div class="col-md-5">
    <form method="post">
        <div class="mb-3">
            <label class="form-label">Старый пароль</label>
            <input type="password" name="old_password"
                   class="form-control {% if errors.old_password %}is-invalid{% endif %}">
            {% for e in errors.get('old_password', []) %}
                <div class="invalid-feedback">{{ e }}</div>
            {% endfor %}
        </div>
        <div class="mb-3">
            <label class="form-label">Новый пароль</label>
            <input type="password" name="new_password"
                   class="form-control {% if errors.new_password %}is-invalid{% endif %}">
            {% for e in errors.get('new_password', []) %}
                <div class="invalid-feedback">{{ e }}</div>
            {% endfor %}
        </div>
        <div class="mb-3">
            <label class="form-label">Повторите новый пароль</label>
            <input type="password" name="confirm_password"
                   class="form-control {% if errors.confirm_password %}is-invalid{% endif %}">
            {% for e in errors.get('confirm_password', []) %}
                <div class="invalid-feedback">{{ e }}</div>
            {% endfor %}
        </div>
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a href="{{ url_for('index') }}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
