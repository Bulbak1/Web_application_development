{% extends 'base.html' %}

{% block content %}
<h1 class="my-5">Проверка номера телефона</h1>
<div class="row">
    <div class="col-md-5">
        <form method="post">
            <div class="mb-3">
                <label for="phone" class="form-label">Номер телефона</label>
                <input type="text"
                       class="form-control {% if error %}is-invalid{% endif %}"
                       id="phone" name="phone"
                       value="{{ phone_input }}"
                       placeholder="+7 (999) 123-45-67">
                {% if error %}
                    <div class="invalid-feedback">{{ error }}</div>
                {% endif %}
            </div>
            <button type="submit" class="btn btn-primary">Проверить</button>
        </form>
    </div>
</div>

{% if formatted %}
<hr class="mt-4">
<h4>Отформатированный номер: <span class="text-success">{{ formatted }}</span></h4>
{% endif %}
{% endblock %}
